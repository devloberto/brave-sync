# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo
      - echo "###############################"
      - echo "# Brave Sync Server          -#"
      - echo "#                            -#"
      - echo "# build needed docker images -#"
      - echo "###############################"
      - echo
      - task --list
    silent: true

  clone:
    desc: Clone brave/go-sync into ./go-sync if it does not exist yet
    cmds:
      - '[ -d go-sync ] || git clone https://github.com/brave/go-sync'
    silent: true

  build:
    desc: Build the brave sync server docker images
    deps: [clone]
    cmds:
      - docker compose -f go-sync/docker-compose.yml build web dynamo-local
      - docker tag go-sync-web brave-sync-web
      - docker tag go-sync-dynamo-local brave-sync-dynamo
      - docker image rm go-sync-web go-sync-dynamo-local

  build-amd64:
    desc: Build the brave sync server docker images for linux/amd64
    deps: [clone]
    cmds:
      - docker compose -f go-sync/docker-compose.yml --progress=plain build --platform linux/amd64 web dynamo-local
      - docker tag go-sync-web brave-sync-web
      - docker tag go-sync-dynamo-local brave-sync-dynamo
      - docker image rm go-sync-web go-sync-dynamo-local

  build-arm64:
    desc: Build the brave sync server docker images for linux/arm64
    deps: [clone]
    cmds:
      - docker compose -f go-sync/docker-compose.yml --progress=plain build --platform linux/arm64 web dynamo-local
      - docker tag go-sync-web brave-sync-web
      - docker tag go-sync-dynamo-local brave-sync-dynamo
      - docker image rm go-sync-web go-sync-dynamo-local
