# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  PLATFORM: '{{.PLATFORM | default "linux/amd64"}}'
  GO_SYNC_REF: '{{.GO_SYNC_REF | default "master"}}'
  NOCACHE: '{{.NOCACHE | default "false"}}'

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo
      - echo "###############################"
      - echo "# Brave Sync Server          -#"
      - echo "#                            -#"
      - echo "# build needed docker images -#"
      - echo "###############################"
      - echo
      - task --list
    silent: true

  clone:
    desc: Clone brave/go-sync into ./go-sync at {{.GO_SYNC_REF}} if it does not exist yet
    cmds:
      - '[ -d go-sync ] || git clone https://github.com/brave/go-sync'
      - git -C go-sync fetch --tags origin
      - git -C go-sync checkout {{.GO_SYNC_REF}}
    silent: true

  build:
    desc: Build the brave sync server docker images (set PLATFORM=linux/amd64|linux/arm64, NOCACHE=true to skip cache, GO_SYNC_REF=<branch|tag> to override)
    deps: [clone]
    env:
      DOCKER_DEFAULT_PLATFORM: '{{.PLATFORM}}'
    cmds:
      - sed -i 's/sleep 15/sleep 60/' go-sync/dynamo.Dockerfile
      - cmd: docker compose -f go-sync/docker-compose.yml --progress=plain build {{if eq .NOCACHE "true"}}--no-cache {{end}}web dynamo-local
      - docker tag go-sync-web brave-sync-web
      - docker tag go-sync-dynamo-local brave-sync-dynamo
      - docker image rm go-sync-web go-sync-dynamo-local
